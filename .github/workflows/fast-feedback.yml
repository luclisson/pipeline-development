name: "fast feedback workflow"
on:
  push:
    branches:
      - feature/**
  workflow_dispatch: 
jobs:
  backend-ci:
    name: backend build and test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: list files of repository
        run: |
          echo "repository contains following files"
          tree
      - name: setup java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: run maven tests
        run: |
          cd apps/mvp
          pwd
          mvn -B test
      - name: Debug - Wo sind die Test-Reports?
        if: always() # Wichtig: Muss laufen, auch wenn die Tests rot sind!
        run: |
            echo "Inhalt des target-Ordners:"
            ls -R apps/mvn/target/ || echo "Ordner target existiert nicht!"

      - name: send test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: apps/mvn/target/surefire-reports/*.xml

