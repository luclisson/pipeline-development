name: "fast feedback workflow"
on:
  push:
    branches:
      - feature/**
  workflow_dispatch: 
jobs:
  backend-ci:
    name: backend build and test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: list files of repository
        run: |
          echo "repository contains following files"
          tree
      - name: setup java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: run maven tests
        run: |
          ls
          cd apps/mvp
          pwd
          mvn -B test
      - name: send test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: apps/mvn/target/surefire-reports/*.xml
