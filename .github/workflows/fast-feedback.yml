name: "fast feedback workflow"
on:
  push:
    branches:
      - feature/**
  workflow_dispatch:

  pull_request:
    branches:
      - main
jobs:
  backend-ci:
    name: backend build and test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: setup java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: run maven tests
        run: |
          cd apps/mvp
          pwd
          mvn -B test
      - name: send test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (always())
        with:
          check_name: "Maven Test Results"
          files: | 
            **/target/surefire-reports/*.xml
  

  frontend-ci:
    name: frontend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6.0.2
      - name: debugging path
        run: |
          pwd
          ls
      - name: setup npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: install dependencies
        run: npm ci
      - name: Run React Tests and generate XML
        run: CI=true npm test -- --reporters=default --reporters=jest-junit
      - name: Publish Frontend Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: "React Test Results"
          files: "**/junit.xml"
